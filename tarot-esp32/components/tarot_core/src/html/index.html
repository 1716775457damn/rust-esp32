<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Card Uploader</title>
    <style>
        :root {
            --bg-color: #121212;
            --slot-bg: #2a2a2a;
            --slot-hover: #3a3a3a;
            --accent: #d4af37;
            --text-main: #f0f0f0;
            --text-muted: #888888;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--accent);
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
        }
        .card-slot {
            background-color: var(--slot-bg);
            border: 1px solid #333;
            border-radius: 8px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-slot:hover {
            background-color: var(--slot-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .slot-id {
            font-size: 24px;
            font-weight: bold;
            color: rgba(255,255,255,0.1);
            position: absolute;
            z-index: 1;
        }
        .slot-title {
            z-index: 2;
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .slot-status {
            z-index: 2;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: rgba(0,0,0,0.5);
        }
        .loaded {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }
        img.preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.6;
        }
        #upload-layer {
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(212, 175, 55, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .control-panel {
            margin-bottom: 30px;
            text-align: center;
        }
        .draw-button {
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            color: black;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }
        .draw-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }
        .draw-button:active {
            transform: scale(0.95);
        }
        .active-name {
            margin-top: 15px;
            font-style: italic;
            color: var(--accent);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Oracle Tarot Deck</h1>
    <p>Connect with the cards. Tap to draw or upload new art.</p>

    <div class="control-panel">
        <button id="drawBtn" class="draw-button">✨ Draw Random Card ✨</button>
        <div id="active-card-name" class="active-name">Ready to draw...</div>
    </div>

    <div class="grid-container" id="grid">
        <!-- Slots will be generated here by JS -->
    </div>

    <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" style="display: none;">
    
    <div id="toast" class="toast">Uploaded Successfully!</div>

    <script>
        const MAX_CARDS = 22;
        const TARGET_SIZE = 360;
        
        const MAJOR_ARCANA = [
            "0. The Fool", "I. The Magician", "II. High Priestess", "III. The Empress",
            "IV. The Emperor", "V. The Hierophant", "VI. The Lovers", "VII. The Chariot",
            "VIII. Strength", "IX. The Hermit", "X. Wheel of Fortune", "XI. Justice",
            "XII. The Hanged Man", "XIII. Death", "XIV. Temperance", "XV. The Devil",
            "XVI. The Tower", "XVII. The Star", "XVIII. The Moon", "XIX. The Sun",
            "XX. Judgement", "XX1. The World"
        ];

        const grid = document.getElementById('grid');
        
        // Initialize Grid (Read-only view for local assets)
        for (let i = 0; i < MAJOR_ARCANA.length; i++) {
            let slot = document.createElement('div');
            slot.className = 'card-slot';
            slot.innerHTML = `
                <div class="slot-id">${i}</div>
                <div class="slot-title">${MAJOR_ARCANA[i]}</div>
            `;
            grid.appendChild(slot);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = 1;
            setTimeout(() => { t.style.opacity = 0; }, 3000);
        }

        // Draw Card Logic
        const drawBtn = document.getElementById('drawBtn');
        const activeName = document.getElementById('active-card-name');
        
        drawBtn.addEventListener('click', () => {
            drawBtn.disabled = true;
            drawBtn.innerText = "Drawing...";
            activeName.innerText = "Connecting to the fates...";
            
            fetch('/draw')
            .then(r => r.text())
            .then(res => {
                if(res.startsWith("OK:")) {
                    const idx = res.split(':')[1];
                    const name = MAJOR_ARCANA[idx] || `Card ${idx}`;
                    activeName.innerText = `Current Revelation: ${name}`;
                    showToast(`✨ The Oracle reveals: ${name}`);
                } else {
                    throw new Error(res);
                }
            })
            .catch(e => {
                showToast("Draw Failed: " + e);
                activeName.innerText = "The connection was severed.";
            })
            .finally(() => {
                drawBtn.disabled = false;
                drawBtn.innerText = "✨ Draw Random Card ✨";
            });
        });
    </script>
</body>
</html>
